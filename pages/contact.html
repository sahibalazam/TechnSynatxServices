<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get a Quote | Technsyntax Services</title>
  <link rel="icon" href="../assets/favicon.ico">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
<meta name="title" content="Get a Quote | Technsyntax Services">
<meta name="description" content="Tell us about your project, timeline, and goals. Contact Technsyntax Services today for full-stack web apps, UI/UX design, and API development.">
<meta name="keywords" content="contact Technsyntax, web development quote, hire web developers, UI/UX agency contact">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://services.technsyntax.site/pages/contact.html">

<meta property="og:type" content="website">
<meta property="og:url" content="https://services.technsyntax.site/pages/contact.html">
<meta property="og:title" content="Get a Quote | Technsyntax Services">
<meta property="og:description" content="Tell us about your project, timeline, and goals. We respond within 12-24 hours.">
<meta property="og:image" content="https://technsyntax.site/assets/images/contact-og.jpg">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:url" content="https://services.technsyntax.site/pages/contact.html">
<meta name="twitter:title" content="Get a Quote | Technsyntax Services">
<meta name="twitter:description" content="Tell us about your project, timeline, and goals. We respond within 12-24 hours.">
<meta name="twitter:image" content="https://technsyntax.site/assets/images/contact-og.jpg">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ContactPage",
  "name": "Get a Quote | Technsyntax Services",
  "url": "https://services.technsyntax.site/pages/contact.html",
  "mainEntity": {
    "@type": "Organization",
    "name": "Technsyntax Services",
    "contactPoint": {
      "@type": "ContactPoint",
      "email": "connect@technsyntax.site",
      "contactType": "customer support",
      "availableLanguage": "English"
    }
  }
}
</script>

</head>
<body>
  <div id="header-placeholder"></div>

  <div class="page-header">
    <div class="container">
      <h1>Let's Build It.</h1>
      <p>Tell us about your project, timeline, and goals.</p>
    </div>
  </div>

  <section class="py-5 container">
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem;">
      
      <div>
        <div class="card mb-4">
          <h3 style="margin-bottom: 1rem;">Direct Contact</h3>
          <p style="margin-bottom: 1rem;"><strong style="color: var(--primary);">Email:</strong><br> connect@technsyntax.site</p>
          <p><strong style="color: var(--primary);">Response Time:</strong><br> Within 12-24 Hours</p>
        </div>
      </div>

      <div class="card">
        <h2 style="color: var(--primary); margin-bottom: 1.5rem;">Project Inquiry</h2>
        <form action="#" method="POST">
          
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.2rem;">
            <div>
              <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Name</label>
              <input type="text" required style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: var(--radius); outline: none;">
            </div>
            <div>
              <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Company</label>
              <input type="text" style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: var(--radius); outline: none;">
            </div>
          </div>

          <div style="margin-bottom: 1.2rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Email Address</label>
            <input type="email" required style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: var(--radius); outline: none;">
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.2rem;">
            <div>
              <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Service Required</label>
              <select style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: var(--radius); background: white; outline: none;">
                <option>Full-Stack Web App</option>
                <option>UI/UX Design</option>
                <option>Backend/API Development</option>
                <option>Other</option>
              </select>
            </div>
            <div>
              <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Estimated Budget</label>
              <select style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: var(--radius); background: white; outline: none;">
                <option>Under $1k</option>
                <option>$1k - $5k</option>
                <option>$5k - $10k</option>
                <option>$10k+</option>
              </select>
            </div>
          </div>

          <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Project Details</label>
            <textarea rows="4" required placeholder="Tell us about your project vision..." style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: var(--radius); outline: none; resize: vertical;"></textarea>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Inquiry</button>
        </form>
      </div>

    </div>
  </section>



<script>
  const scriptURL = 'https://script.google.com/macros/s/AKfycbw0N7DCe3rP3FDAyyQN-P1Wg7Pjcj8yEmQXX8htaf5AjaShgCluSW7EbN7sAVXDPN0H2A/exec'; // Wahi URL jo pehle se chal raha hai
  const form = document.querySelector('form');

  form.addEventListener('submit', e => {
    e.preventDefault();
    
    // HTML ko touch kiye bagair positions se data uthana
    const inputs = form.querySelectorAll('input');
    const selects = form.querySelectorAll('select');
    const textarea = form.querySelector('textarea');

    const payload = {
      name: inputs[0].value,
      company: inputs[1].value,
      email: inputs[2].value,
      service: selects[0].value,
      budget: selects[1].value,
      details: textarea.value
    };

    fetch(scriptURL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(payload)
    })
    .then(() => {
      alert('Inquiry successfully sent!');
      form.reset();
    })
    .catch(error => console.error('Error!', error.message));
  });
</script>



  <div id="footer-placeholder"></div>
  <script src="../js/components.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/animations.js"></script>
</body>
</html>
